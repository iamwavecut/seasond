name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Restore Go build cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('go.sum') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ hashFiles('go.sum') }}-
            ${{ runner.os }}-go-build-

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Release helper tests
        run: |
          bash -n scripts/install.sh scripts/release/*.sh
          bash scripts/release/test-next-version.sh
          bash scripts/release/test-build-archives.sh

      - name: Build
        run: go build -o /tmp/seasond ./cmd/seasond
